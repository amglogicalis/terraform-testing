name: Analisis de repositorio

on:
  workflow_dispatch:
    inputs:
      rama:
        description: 'Rama a analizar'
        required: true
        default: 'main'

jobs:
  analizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rama }}

      - name: Ejecutar analisis independiente
        uses: amglogicalis/repo-analysis-action@main